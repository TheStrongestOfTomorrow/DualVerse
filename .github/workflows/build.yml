name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK and CMake
      run: |
        sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v3

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Get version
      id: version
      run: |
        VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: List build outputs
      run: |
        echo "=== Debug APK ===" 
        ls -la app/build/outputs/apk/debug/ || echo "No debug output"
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || echo "No release output"

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DualVerse-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DualVerse-Release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Rename APKs for release
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk DualVerse-${{ steps.version.outputs.version }}-debug.apk
        cp app/build/outputs/apk/release/app-release-unsigned.apk DualVerse-${{ steps.version.outputs.version }}-release.apk || true

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.2
      with:
        keep_latest: 3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: DualVerse ${{ steps.version.outputs.version }}
        body: |
          ## DualVerse ${{ steps.version.outputs.version }}
          
          **Commit:** `${{ github.sha }}`
          **Date:** ${{ github.event.head_commit.timestamp }}
          
          ### 📥 Downloads
          
          | File | Description |
          |------|-------------|
          | `DualVerse-${{ steps.version.outputs.version }}-debug.apk` | Debug build |
          | `DualVerse-${{ steps.version.outputs.version }}-release.apk` | Release build |
          
          ### 📱 Requirements
          - Android 8.0+ (API 26+)
          - ARM64 device
          - 500MB+ free storage
          
          ### ⚠️ Note
          This is an **unsigned** build. You may need to enable "Install from unknown sources" in your device settings.
        draft: false
        prerelease: false
        files: |
          DualVerse-${{ steps.version.outputs.version }}-debug.apk
          DualVerse-${{ steps.version.outputs.version }}-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Separate job for error reporting
  build-status:
    needs: build
    runs-on: ubuntu-latest
    if: failure()
    steps:
    - name: Report build failure
      run: |
        echo "Build failed! Check the build job logs for details."
        echo "Common issues:"
        echo "1. Missing dependencies"
        echo "2. SDK/NDK not properly installed"
        echo "3. Gradle sync issues"
