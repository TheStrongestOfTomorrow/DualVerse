name: Auto APK Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get version info
      id: version
      run: |
        # Generate version based on date and short commit hash
        VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"

    - name: Rename APKs
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk
        mv app/build/outputs/apk/release/app-release-unsigned.apk DualVerse-${{ steps.version.outputs.VERSION }}-release.apk

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.2
      with:
        keep_latest: 5
        delete_tag_pattern: v20
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create/Update Latest Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: DualVerse Latest Build
        body: |
          ## DualVerse Latest Auto-Build
          
          **Build:** ${{ steps.version.outputs.VERSION }}
          **Commit:** ${{ github.sha }}
          **Date:** ${{ github.event.head_commit.timestamp }}
          
          ### Downloads
          | File | Description |
          |------|-------------|
          | `DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk` | Debug build with logging |
          | `DualVerse-${{ steps.version.outputs.VERSION }}-release.apk` | Release build (optimized) |
          
          ### Requirements
          - Android 8.0+ (API 26+)
          - ARM64 device
          - ~200MB storage for ROM
        draft: false
        prerelease: false
        files: |
          DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk
          DualVerse-${{ steps.version.outputs.VERSION }}-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DualVerse-Latest
        path: |
          DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk
          DualVerse-${{ steps.version.outputs.VERSION }}-release.apk
        retention-days: 30
