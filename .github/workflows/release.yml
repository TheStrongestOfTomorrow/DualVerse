name: Auto APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get version name
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Rename APKs
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk
        mv app/build/outputs/apk/release/app-release-unsigned.apk DualVerse-${{ steps.version.outputs.VERSION }}-release.apk

    - name: Generate Release Notes
      id: notes
      run: |
        echo "## DualVerse ${{ steps.version.outputs.VERSION }}" > release_notes.md
        echo "" >> release_notes.md
        echo "### What's New" >> release_notes.md
        echo "- Multi-account gaming support" >> release_notes.md
        echo "- Container-based virtualization" >> release_notes.md
        echo "- Device fingerprint spoofing" >> release_notes.md
        echo "- Built-in game account manager" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Downloads" >> release_notes.md
        echo "| File | Description |" >> release_notes.md
        echo "|------|-------------|" >> release_notes.md
        echo "| \`DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk\` | Debug build with logging |" >> release_notes.md
        echo "| \`DualVerse-${{ steps.version.outputs.VERSION }}-release.apk\` | Release build (optimized) |" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Requirements" >> release_notes.md
        echo "- Android 8.0+ (API 26+)" >> release_notes.md
        echo "- ARM64 device" >> release_notes.md
        echo "- ~200MB storage for ROM" >> release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: DualVerse ${{ steps.version.outputs.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
        files: |
          DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk
          DualVerse-${{ steps.version.outputs.VERSION }}-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DualVerse-${{ steps.version.outputs.VERSION }}
        path: |
          DualVerse-${{ steps.version.outputs.VERSION }}-debug.apk
          DualVerse-${{ steps.version.outputs.VERSION }}-release.apk
        retention-days: 90
